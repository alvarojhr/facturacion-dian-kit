name: ci

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect markdown-only changes
        id: changes
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"

            if [[ "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
              base_sha="$(git rev-list --max-parents=0 HEAD)"
            fi
          fi

          mapfile -t changed_files < <(git diff --name-only "$base_sha" "$head_sha")

          echo "Changed files:"
          printf '%s\n' "${changed_files[@]}"

          docs_only=true
          for file in "${changed_files[@]}"; do
            if [[ "$file" != *.md ]]; then
              docs_only=false
              break
            fi
          done

          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"

      - name: Skip heavy CI for markdown-only changes
        if: steps.changes.outputs.docs_only == 'true'
        run: echo "Only .md files changed; skipping heavy validation steps."

      - name: Validate public docs and examples
        run: python3 scripts/validate_public_docs.py

      - uses: actions/setup-python@v5
        if: steps.changes.outputs.docs_only != 'true'
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            packages/core/pyproject.toml
            packages/server/pyproject.toml

      - name: Install packages
        if: steps.changes.outputs.docs_only != 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./packages/core -e "./packages/server[dev]"

      - name: Validate skill metadata
        if: steps.changes.outputs.docs_only != 'true'
        run: python scripts/validate_skill.py

      - name: Ruff
        if: steps.changes.outputs.docs_only != 'true'
        run: python -m ruff check .

      - name: Mypy
        if: steps.changes.outputs.docs_only != 'true'
        run: python -m mypy packages/core/src packages/server/src

      - name: Pytest
        if: steps.changes.outputs.docs_only != 'true'
        run: python -m pytest

      - name: Build Docker image
        if: steps.changes.outputs.docs_only != 'true'
        run: docker build -t facturacion-dian-api .

      - name: Gitleaks
        if: steps.changes.outputs.docs_only != 'true'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
