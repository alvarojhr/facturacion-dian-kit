[project]
name = "facturacion-dian-api-core"
version = "0.1.0a0"
description = "Core DIAN invoicing domain, XML, signing, and SOAP integration logic"
license = {text = "Apache-2.0"}
requires-python = ">=3.12"
dependencies = [
    "cryptography>=44.0.0",
    "httpx>=0.28.0",
    "lxml>=5.3.0",
    "pydantic>=2.10.0",
    "pydantic-settings>=2.7.0",
    "python-dotenv>=1.0.0",
    "signxml>=4.4.0",
]

[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
include = ["facturacion_dian_api.core*"]
namespaces = true
